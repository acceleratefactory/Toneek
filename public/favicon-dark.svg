<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img">
  <title>Toneek</title>
  <desc>Toneek favicon dark — hexagon symbol on dark background</desc>
  <defs>
    <linearGradient id="mgfd" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#2A0F06"/>
      <stop offset="48%" stop-color="#7B3518"/>
      <stop offset="100%" stop-color="#C87D3E"/>
    </linearGradient>
  </defs>
  <!-- Deep brown background -->
