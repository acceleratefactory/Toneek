  <!-- Three arcs scaled to 32px -->
  <path d="M9,12 Q16,9 23,12"
    fill="none" stroke="#F7F1EB" stroke-opacity="0.34" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M8,17 Q16,14 24,17"
    fill="none" stroke="#F7F1EB" stroke-opacity="0.26" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M9,22 Q16,19 23,22"
    fill="none" stroke="#F7F1EB" stroke-opacity="0.20" stroke-width="1.3" stroke-linecap="round"/>
</svg>
