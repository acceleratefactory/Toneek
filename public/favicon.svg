<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img">
  <title>Toneek</title>
  <desc>Toneek favicon — hexagon symbol</desc>
  <defs>
    <linearGradient id="mgf" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#2A0F06"/>
      <stop offset="48%" stop-color="#7B3518"/>
      <stop offset="100%" stop-color="#C87D3E"/>
    </linearGradient>
  </defs>
  <!-- Cream background for favicon context -->
  <rect width="32" height="32" rx="6" fill="#F7F1EB"/>
  <!-- Symbol centred in 32x32 -->
  <path d="M16,2 L27,8 L27,24 L16,30 L5,24 L5,8 Z"
